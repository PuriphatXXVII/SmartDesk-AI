name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  python-deps:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pip-audit + bandit
        run: pip install pip-audit bandit
      - name: pip-audit (backend)
        working-directory: backend
        run: pip-audit --strict || true
      - name: Bandit (static security)
        working-directory: backend
        run: bandit -r app -lll -ii || true

  npm-deps:
    name: NPM dependency audit (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [frontend, widget]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install (creates lockfile)
        working-directory: ${{ matrix.package }}
        run: npm install --package-lock-only --no-audit --no-fund
      - name: Audit
        working-directory: ${{ matrix.package }}
        run: npm audit --audit-level=high || true

  secrets-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
